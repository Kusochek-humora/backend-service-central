name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/backups
            cd ~/backend-service-central
            git pull
            printf 'PORT=3000\nHOST=0.0.0.0\nNODE_ENV=production\nDB_HOST=db\nDB_PORT=5432\nDB_USER=${{ secrets.DB_USER }}\nDB_PASSWORD=${{ secrets.DB_PASSWORD }}\nDB_NAME=${{ secrets.DB_NAME }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\n' > .env
            sudo ufw allow 3000/tcp
            sudo docker-compose down
            sudo docker-compose up -d --build
            sleep 10
            sudo docker-compose exec -T app npm run migration:run:prod
            sudo docker-compose exec -T app node dist/db/seeds/create-chief-editor.js
            sudo docker-compose logs app
