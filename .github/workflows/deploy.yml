name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_MERCH: ${{ secrets.TELEGRAM_CHAT_MERCH }}
          TELEGRAM_CHAT_NEWS: ${{ secrets.TELEGRAM_CHAT_NEWS }}
          INTERNAL_CHANNEL_ID: ${{ secrets.INTERNAL_CHANNEL_ID }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_MERCH,TELEGRAM_CHAT_NEWS,INTERNAL_CHANNEL_ID
          script: |
            if ! docker compose version > /dev/null 2>&1; then
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.1/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            mkdir -p ~/backups
            cd ~/backend-service-central
            git pull
            printf "DB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nDB_HOST=db\nJWT_SECRET=%s\nNODE_ENV=production\nTELEGRAM_BOT_TOKEN=%s\nTELEGRAM_CHAT_MERCH=%s\nTELEGRAM_CHAT_NEWS=%s\nINTERNAL_CHANNEL_ID=%s\n" \
              "$DB_USER" "$DB_PASSWORD" "$DB_NAME" "$JWT_SECRET" "$TELEGRAM_BOT_TOKEN" "$TELEGRAM_CHAT_MERCH" "$TELEGRAM_CHAT_NEWS" "$INTERNAL_CHANNEL_ID" > .env
            sudo ufw allow 3000/tcp
            sudo ufw deny 5432/tcp
            sudo docker compose up -d db
            sleep 5
            sudo docker compose exec -T db psql -U postgres -c "ALTER USER postgres PASSWORD '${DB_PASSWORD}';"
            sudo docker compose exec -T db psql -U postgres -c "DROP ROLE IF EXISTS wog; DROP ROLE IF EXISTS woglet;"
            sudo docker compose build app
            sudo docker compose stop app
            sudo docker compose rm -f app
            sudo docker compose up -d --no-deps app
            sleep 10
            sudo docker compose exec -T app npm run migration:run:prod
            sudo docker compose exec -T app node dist/db/seeds/create-chief-editor.js
            sudo docker compose logs db
            sudo docker compose logs app
